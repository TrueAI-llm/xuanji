[llm]
default_provider = "zhipu"

[llm.providers.zhipu]
protocol = "anthropic"
model = "glm-5.1"
api_key = "sk-1234"
base_url = "http://192.168.8.2:4000"

[agent]
max_loops = 10
step_timeout = "60s"
confirm_risky = true
risky_patterns = []
text_tool_mode = false

[[mcp_server]]
name = "shell"
command = "target/debug/xuanji-mcp-shell"

[[mcp_server]]
name = "akshare-one-mcp"
command = "uvx"
args = ["akshare-one-mcp"]

[[mcp_server]]
name = "playwright"
command = "npx"
args = [
    "-y",
    "@playwright/mcp",
]

[[mcp_server]]
name = "china-stock-mcp"
command = "npx"
args = [
    "-y",
    "xinkuang/china-stock-mcp",
]

[trigger]
webhook_port = 9090
workflows_dir = "/home/gaochao/.xuanji/workflows"

[memory]
max_history = 100
max_context_turns = 20

[budget]
total_budget = 0
per_agent_budget = 0
max_depth = 3
